# 29893_deploy.yml
# Skripta za dostavo kode.
# Zazene se po uspesnem zakljucku workflowa 29893_test,
# zgradi Docker sliko in jo objavi na DockerHub.

name: 29893_deploy

on:
  workflow_run:
    workflows:
      - 29893_test
    types:
      - completed

jobs:
  deploy:
    name: Gradnja in objava Docker slike
    runs-on: self-hosted

    # Deploy se izvede samo, ce je bil testni workflow uspesen.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # Prenos kode iz GitHub repozitorija.
      - name: Prenos kode
        uses: actions/checkout@v4

      # Prijava v DockerHub z uporabo GitHub skrivnosti.
      - name: Prijava v DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Gradnja Docker slike.
      - name: Gradnja Docker slike
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/vaja2-git:latest .

      # Objava Docker slike na DockerHub.
      - name: Objava Docker slike
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/vaja2-git:latest